/**
 * Optional: Displays the generated commit message from clipboard for easy copying into the Git tool.
 */
tasks.register('printCommitMessage') {
    group = "automation"
    description = "Extracts and prints the [COMMIT_MSG] from clipboard for manual commit."
    doLast {
        try {
            def clip = Toolkit.defaultToolkit.systemClipboard
            def content = (String) clip.getData(DataFlavor.stringFlavor)
            def matcher = (content =~ /(?s)\[COMMIT_MSG\]\n(.*?)\s*\[END_COMMIT_MSG\]/)
            
            if (matcher.find()) {
                println "\n--- GENERATED COMMIT MESSAGE ---"
                println matcher.group(1).trim()
                println "----------------------------------\n"
            } else if (content.contains("[COMMIT_MSG]")) {
                // Fallback for non-strictly formatted matches
                def raw = content.split("\\[COMMIT_MSG\\]")[1].split("\\[END_COMMIT_MSG\\]")[0]
                println raw.trim()
            } else {
                 println "No [COMMIT_MSG] found in clipboard. Copy the AI's response first."
            }
        } catch (Exception e) {
            System.err.println("Failed to read clipboard: ${e.message}")
        }
    }
}


/**
 * Updates project files from AI response.
 * Configuration-cache safe.
 */
tasks.register('processStudioResponse') {
    group = "automation"
    description = "Ingests [TARGET] blocks from clipboard into the project."
    
    def rootDir = layout.projectDirectory.asFile

    doLast {
        try {
            def clip = Toolkit.defaultToolkit.systemClipboard
            def content = (String) clip.getData(DataFlavor.stringFlavor)
            
            def matcher = (content =~ /(?s)\[TARGET:\s*(.*?)\]\n(.*?)\s*\[END_TARGET\]/)
            def updateCount = 0
            
            matcher.each { _, filePath, fileContent ->
                // Resolve file via Java File API to avoid 'project.file' execution-time call
                def targetFile = new File(rootDir, filePath.trim())
                targetFile.parentFile.mkdirs()
                targetFile.setText(fileContent.trim(), 'UTF-8')
                println "Updated: ${filePath}"
                updateCount++
            }
            
            if (updateCount == 0) println "No valid [TARGET] blocks found."
        } catch (Exception e) {
            System.err.println("Processing failed: ${e.message}")
        }
    }
}

/**
 * Aggregates build configuration for AI "Gradle Gatekeeper" consumption.
 * Captures build scripts, properties, and current dependency tree.
 */
tasks.register('copyGradleSyncPrompt') {
    group = "automation"
    description = "Copies build-system configuration to clipboard for Gradle Assistant."
    outputs.upToDateWhen { false }

    def root = layout.projectDirectory
    def filesToCapture = [
        "build.gradle",
        "gradle.properties",
        "settings.gradle",
        "gradle/wrapper/gradle-wrapper.properties"
    ]

    doLast {
        def manifest = new StringBuilder()
        def timestamp = new java.text.SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
        
        manifest.append("[GRADLE BUILD SYSTEM MANIFEST - SYNCED: ${timestamp}]\n")
        manifest.append("ROLE: Provide this to the Assistant for build script refactoring and dependency management.\n\n")

        filesToCapture.each { filename ->
            def target = root.file(filename).asFile
            if (target.exists()) {
                manifest.append("--- FILE: ${filename} ---\n")
                manifest.append(target.getText('UTF-8'))
                manifest.append("\n--- END FILE ---\n")
            }
        }

        // Capture dependencies inside the libs folder (flat-dir style) if it exists
        def libsDir = root.dir("libs").asFile
        if (libsDir.exists()) {
            manifest.append("\n--- DIRECTORY LISTING: /libs/ ---\n")
            libsDir.eachFile { f -> if(f.isFile()) manifest.append("Found: ${f.name}\n") }
            manifest.append("--- END DIRECTORY ---\n")
        }

        manifest.append("\n[END MANIFEST]")

        try {
            def selection = new StringSelection(manifest.toString())
            Toolkit.defaultToolkit.systemClipboard.setContents(selection, selection)
            println "Gradle Sync Manifest copied at ${timestamp}."
            println "Paste this to me when asking for new dependencies or script optimizations."
        } catch (Exception e) {
            System.err.println("Clipboard Sync Error: ${e.message}")
        }
    }
}

import java.awt.Toolkit
import java.awt.datatransfer.StringSelection
import java.awt.datatransfer.DataFlavor
