/**
 * Generates a prompt for the Wiki Writer (Technical Persona).
 * Aggregates Source, Assets, and Existing Wiki pages into a high-density architect context.
 */
tasks.register('copyUpdateWikiPrompt') {
    group = "automation"
    description = "Prepares the Architectural Wiki Writer prompt for AI synchronization."
    outputs.upToDateWhen { false }

    def rootDir = layout.projectDirectory
    def wikiDir = rootDir.dir("wiki")
    def sourceDirs = [rootDir.dir("src/main/java"), rootDir.dir("src/main/resources")]

    doLast {
        def prompt = new StringBuilder()
        def timestamp = new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())

        // 1. PROJECT MANAGER GUIDELINES (AI INSTRUCTIONS)
        prompt.append("[SYSTEM INSTRUCTION - TECHNICAL WIKI WRITER]\n")
        prompt.append("1. DUAL AUDIENCE PHILOSOPHY:\n")
        prompt.append("   - THE PLAYER (Automator): Document blocks, canvas usage (X:22-508, Y:4-240), node behaviors, and performance limits.\n")
        prompt.append("   - THE DEVELOPER (Addon Creator): Document 'dta.sfmflow.api', custom 'FlowComponentType' registration, and property bindings.\n")
        prompt.append("2. SYSTEM INTEGRATION & FORMATTING:\n")
        prompt.append("   - You MUST output files using the following delimiter format:\n")
        prompt.append("     [TARGET: wiki/Page-Name.md ]\n")
        prompt.append("     # Page Content...\n")
        prompt.append("     [END_TARGET]\n")
        prompt.append("3. DOCUMENTATION RULES:\n")
        prompt.append("   - Keep API documentation strictly isolated from Player Guides.\n")
        prompt.append("   - Use tables and ASCII diagrams for canvas/UI specs.\n")
        prompt.append("   - Never use deprecated classes; verify against the provided CODEBASE SNAPSHOT.\n")
        prompt.append("[END INSTRUCTION]\n\n")

        // 2. EXISTING WIKI CONTEXT (Gather all files in wiki/ dir)
        prompt.append("[WIKI CONTEXT SNAPSHOT]\n")
        if (wikiDir.asFile.exists()) {
            wikiDir.asFile.eachFileMatch(~/.*\.md/) { f ->
                prompt.append("--- EXISTING FILE: wiki/${f.name} ---\n")
                prompt.append(f.getText('UTF-8'))
                prompt.append("\n--- END FILE ---\n")
            }
        } else {
            prompt.append("No existing wiki pages found. Initialize according to guidelines.\n")
        }
        prompt.append("[END WIKI CONTEXT]\n\n")

        // 3. CURRENT CODEBASE & ASSETS
        prompt.append("[CURRENT CODEBASE SNAPSHOT - ${timestamp}]\n")
        sourceDirs.each { directory ->
            def dirFile = directory.asFile
            if (dirFile.exists()) {
                dirFile.eachFileRecurse { f ->
                    if (f.isFile() && !f.path.contains(".gradle") && !f.path.contains("bin")) {
                        def relPath = rootDir.asFile.toPath().relativize(f.toPath())
                        def isPng = f.name.endsWith('.png')
                        def isBinary = isPng || f.name.endsWith('.ogg') || f.name.endsWith('.bbmodel')

                        prompt.append("\n--- FILE: ${relPath} ---\n")
                        if (isBinary) {
                            prompt.append("[BINARY ASSET DETECTED]\nVERIFIED_PATH: resources/${relPath.toString().replace('\\', '/')}\n")
                            if (isPng) {
                                try {
                                    def img = ImageIO.read(f)
                                    if (img != null) { prompt.append("DIMENSIONS: ${img.width}x${img.height}px\n"); img.flush() }
                                } catch (Exception e) {}
                            }
                        } else {
                            prompt.append(f.getText('UTF-8'))
                        }
                        prompt.append("\n--- END FILE ---\n")
                    }
                }
            }
        }
        prompt.append("\n[END SNAPSHOT]")

        try {
            def selection = new StringSelection(prompt.toString())
            Toolkit.defaultToolkit.systemClipboard.setContents(selection, selection)
            println "Architectural Wiki prompt copied (Code + Assets + Guidelines)."
        } catch (Exception e) {
            System.err.println("Clipboard Access Failure: ${e.message}")
        }
    }
}

/**
 * Processes Multi-File Wiki responses from AI.
 * Parses [TARGET: wiki/path] blocks and writes to local project.
 */
tasks.register('processWikiResponse') {
    group = "automation"
    description = "Ingests multi-page wiki updates into the /wiki folder."
    
    def projectBase = layout.projectDirectory.asFile

    doLast {
        try {
            def clip = Toolkit.defaultToolkit.systemClipboard
            def content = (String) clip.getData(DataFlavor.stringFlavor)
            
            // Regex handles optional spacing in the TARGET tag as per PM spec
            def matcher = (content =~ /(?s)\[TARGET:\s*(wiki\/.*?\.md)\s*\]\n(.*?)\s*\[END_TARGET\]/)
            def updateCount = 0
            
            matcher.each { _, filePath, fileContent ->
                def targetFile = new File(projectBase, filePath.trim())
                targetFile.parentFile.mkdirs()
                
                // Backup existing pages
                if (targetFile.exists()) {
                    def backup = new File(targetFile.absolutePath + ".bak")
                    backup.text = targetFile.text
                }
                
                targetFile.setText(fileContent.trim(), 'UTF-8')
                println "Updated Wiki Page: ${filePath}"
                updateCount++
            }
            
            if (updateCount == 0) {
                println "Abort: No valid [TARGET: wiki/...] blocks found in clipboard."
            } else {
                println "Successfully updated ${updateCount} wiki pages."
            }
        } catch (Exception e) {
            System.err.println("Failed to ingest Wiki update: ${e.message}")
        }
    }
}
