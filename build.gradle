/**
 * FIXED: processRoadmapResponse
 * Uses targetFile.text to perform the backup to avoid MethodSignature errors.
 */
tasks.register('processRoadmapResponse') {
    group = "automation"
    description = "Ingests AI-optimized ROADMAP.md from clipboard."
    def roadmapFileProvider = layout.projectDirectory.file("ROADMAP.md")

    doLast {
        try {
            def clip = Toolkit.defaultToolkit.systemClipboard
            def content = (String) clip.getData(DataFlavor.stringFlavor)
            def matcher = (content =~ /(?s)\[UPDATED_ROADMAP\]\s*\n(.*?)\s*\[END_ROADMAP\]/)
            
            if (matcher.find()) {
                def updatedContent = matcher.group(1).trim()
                def targetFile = roadmapFileProvider.asFile
                
                if (targetFile.exists()) {
                    def backup = new File(targetFile.absolutePath + ".bak")
                    // Correct Groovy way to copy file content
                    backup.text = targetFile.text 
                    println "Backup created: ROADMAP.md.bak"
                }
                
                targetFile.setText(updatedContent, 'UTF-8')
                println "ROADMAP.md successfully updated."
            } else {
                println "Abort: [UPDATED_ROADMAP] block not found."
            }
        } catch (Exception e) {
            System.err.println("Failed to process roadmap: ${e.message}")
        }
    }
}

